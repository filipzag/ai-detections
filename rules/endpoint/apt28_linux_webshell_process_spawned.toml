[metadata]
creation_date = "2026/02/24"
integration = ["endpoint"]
maturity = "production"
updated_date = "2026/02/24"
min_stack_version = "8.14.0"

[rule]
name = "Linux Web Shell - Suspicious Process Spawned by Web Server"
author = ["AI Detection Engineering"]
description = """
Detects suspicious child processes spawned by common Linux web server processes (apache, nginx, tomcat).
APT28 is known to deploy web shells on compromised servers for persistent remote access. This sequence
correlates a web server spawning a shell interpreter followed by reconnaissance or data staging commands.
"""
risk_score = 73
severity = "high"
license = "Elastic License v2"
rule_id = "apt28-linux-t1505003-webshell-001"
type = "eql"
language = "eql"
index = ["logs-endpoint.events.process-default"]

query = '''
sequence by host.id with maxspan=30s
  [process where host.os.type == "linux" and event.type == "start" and event.action == "exec" and
    process.parent.name in ("apache2", "httpd", "nginx", "java", "tomcat", "node", "php-fpm", "php", "lighttpd") and
    process.name in ("bash", "dash", "sh", "zsh", "csh", "ksh", "python", "python3", "perl", "ruby")]
  [process where host.os.type == "linux" and event.type == "start" and event.action == "exec" and
    process.name in ("whoami", "id", "uname", "cat", "ls", "wget", "curl", "nc", "ncat", "netcat",
                     "ip", "ifconfig", "ss", "netstat", "find", "chmod", "chown", "base64", "python", "python3")]
'''

[[rule.threat]]
framework = "MITRE ATT&CK"

  [[rule.threat.technique]]
  id = "T1505"
  name = "Server Software Component"
  reference = "https://attack.mitre.org/techniques/T1505/"

    [[rule.threat.technique.subtechnique]]
    id = "T1505.003"
    name = "Web Shell"
    reference = "https://attack.mitre.org/techniques/T1505/003/"

  [rule.threat.tactic]
  id = "TA0003"
  name = "Persistence"
  reference = "https://attack.mitre.org/tactics/TA0003/"
